# ========== SERVER ==========
server.port=8080

# ========== DATABASE ==========
# Đã thêm: &allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/yearbook_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Đã sửa: Chuyển đổi thành MySQLDialect (hoặc bạn có thể xóa hẳn dòng này đi)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
